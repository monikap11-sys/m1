<html>
<head>
<title>Grand Plaza Hotel</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1 align="center">Grand Plaza Hotel</h1>

<hr>

<h2>Deluxe Room</h2>

<img src="images/room1.jpg" width="200">
<img src="images/room2.jpg" width="200">
<img src="images/room3.jpg" width="200">

<p><b>Amenities:</b></p>
<ul>
<li>AC Room</li>
<li>Free WiFi</li>
<li>TV</li>
</ul>

<p><b>Price:</b> ₹2000 per night</p>

<hr>

<h2>Suite Room</h2>

<img src="images/room4.jpg" width="200">

<p><b>Amenities:</b></p>
<ul>
<li>Luxury Bed</li>
<li>Balcony</li>
<li>Mini Bar</li>
</ul>

<p><b>Price:</b> ₹4000 per night</p>

<hr>

<h2>Book Your Room</h2>

Name:<br>
<input type="text" id="name"><br><br>

Check-in Date:<br>
<input type="date" id="checkin"><br><br>

Check-out Date:<br>
<input type="date" id="checkout"><br><br>

Room Type:<br>
<select id="room">
<option>Deluxe Room</option>
<option>Suite Room</option>
</select><br><br>


<button onclick="checkRoom()">Check Availability</button>
<p id="result" style="font-weight:bold;"></p>
<script src="script.js"></script>


</body>
</html>
